# Pinned tool versions — single source of truth for local dev and CI.
# Renovate's native mise manager tracks these (both core and aqua backends).
# Docker-image-pinned tools (mermaid-cli, plantuml) stay in Makefile, as does
# KUBECTL_VERSION which doubles as a Dockerfile --build-arg for images/Dockerfile.
[tools]
"aqua:koalaman/shellcheck"  = "0.11.0"
"aqua:rhysd/actionlint"     = "1.7.12"
"aqua:gitleaks/gitleaks"    = "8.30.1"
"aqua:aquasecurity/trivy"   = "0.72.0"
"aqua:hadolint/hadolint"    = "2.14.0"
"aqua:nektos/act"           = "0.2.89"
"aqua:bats-core/bats-core"  = "1.13.0"
# jq bumps are MANUAL: Renovate's mise manager can't strip jq's `jq-` tag prefix
# (its auto extractVersion is `^v?`; neither a packageRule `extractVersion` nor a
# `.mise.toml` `version_prefix` overrides it for the aqua backend — both verified
# 2026-06-29). It detects jq but never proposes a bump. Check `mise latest aqua:jqlang/jq`.
"aqua:jqlang/jq"            = "1.8.2"
"aqua:kubernetes-sigs/kind" = "0.32.0"
"aqua:kubernetes/kubectl"   = "1.36.3"
