name: Cleanup old workflow runs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_call:

permissions:
  actions: write

concurrency:
  group: cleanup-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      RETAIN_DAYS: 7
      KEEP_MINIMUM: 5
    steps:
      - name: Delete old workflow runs
        run: |
          CUTOFF=$(date -u -d "$RETAIN_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)
          gh run list --repo "${{ github.repository }}" \
            --json databaseId,createdAt --limit 200 \
            --jq "sort_by(.createdAt) | reverse | .[${KEEP_MINIMUM}:] | .[] | select(.createdAt < \"${CUTOFF}\") | .databaseId" \
          | xargs -r -I{} gh run delete {} --repo "${{ github.repository }}"

  cleanup-caches:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete caches from merged/closed branches
        run: |
          gh api "repos/${{ github.repository }}/actions/caches" --paginate \
            --jq '.actions_caches[] | select(.ref | startswith("refs/pull/")) | .id' \
          | xargs -r -I{} gh api -X DELETE "repos/${{ github.repository }}/actions/caches/{}"
