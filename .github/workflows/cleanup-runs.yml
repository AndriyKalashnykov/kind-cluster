name: Cleanup old workflow runs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_call:

# Least privilege: no workflow-wide grant — each job below requests only
# the `actions: write` it needs (run/cache deletion).
permissions: {}

concurrency:
  group: cleanup-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  cleanup-runs:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: write   # gh run delete
    env:
      GH_TOKEN: ${{ github.token }}
      RETAIN_DAYS: 7
      KEEP_MINIMUM: 5
    steps:
      - name: Delete old workflow runs
        run: |
          CUTOFF=$(date -u -d "$RETAIN_DAYS days ago" +%Y-%m-%dT%H:%M:%SZ)
          # Retain the newest KEEP_MINIMUM runs PER WORKFLOW (group_by
          # .workflowName), THEN delete any remaining run older than CUTOFF.
          # A single GLOBAL minimum deregisters low-frequency workflows: on a
          # quiet repo the newest KEEP_MINIMUM runs are all weekly-cleanup runs,
          # so a sibling cron workflow's runs are all older-than-cutoff and get
          # purged — `gh run delete` on a workflow's LAST run flips it to
          # state: deleted (vanishes from the Actions tab + required-check
          # resolution). See /ci-workflow "Retention MUST be per-workflow".
          gh run list --repo "${{ github.repository }}" \
            --json databaseId,createdAt,workflowName --limit 300 \
          | jq -r --arg cutoff "$CUTOFF" --argjson keep "$KEEP_MINIMUM" '
              group_by(.workflowName)
              | map(sort_by(.createdAt) | reverse | .[$keep:])
              | add // []
              | .[] | select(.createdAt < $cutoff) | .databaseId
            ' \
          | xargs -r -I{} gh run delete {} --repo "${{ github.repository }}"

  cleanup-caches:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: write   # gh api DELETE .../actions/caches/{id}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete caches from merged/closed branches
        run: |
          gh api "repos/${{ github.repository }}/actions/caches" --paginate \
            --jq '.actions_caches[] | select(.ref | startswith("refs/pull/")) | .id' \
          | xargs -r -I{} gh api -X DELETE "repos/${{ github.repository }}/actions/caches/{}"
