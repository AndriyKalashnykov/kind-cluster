name: Monitoring E2E

on:
  schedule:
    - cron: '0 5 * * 0'  # Sunday 05:00 UTC (after e2e-metallb at 04:00)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/kind-add-kube-prometheus-stack.sh'
      - '.github/workflows/monitoring-test.yml'

permissions:
  contents: read

concurrency:
  group: monitoring-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monitoring-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make deps

      - name: Bring up full stack (cluster + ingress + cloud-provider-kind + demo apps)
        # `make install-all` runs scripts/kind-install-all.sh which also applies
        # k8s/demo-apps-ingress.yaml, so demo.localdev.me is wired by the time
        # the next step polls for route readiness.
        run: make install-all

      - name: Wait for ingress route readiness
        # K1.5 — same poll as ci.yml. cloud-provider-kind's per-Service
        # kindccm-<hash> Envoy sidecar can take 5–60s after IP assignment to
        # wire the data path.
        run: |
          INGRESS_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          for i in $(seq 1 60); do
            if docker exec kind-control-plane curl -sf --max-time 3 -H 'Host: demo.localdev.me' "http://${INGRESS_IP}/" 2>/dev/null | grep -q 'It works!'; then
              echo "ingress route ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: ingress route did not become reachable within 120s"
          kubectl -n ingress-nginx get pods -o wide
          docker ps --filter name=cloud-provider-kind --filter name=kindccm- --format 'table {{.Names}}\t{{.Status}}'
          exit 1

      - name: Install kube-prometheus-stack
        run: make kube-prometheus-stack

      - name: Smoke test (with monitoring assertions)
        env:
          TEST_MONITORING: yes
        run: make e2e
