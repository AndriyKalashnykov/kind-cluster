name: Monitoring E2E

on:
  schedule:
    - cron: '0 5 * * 0'  # Sunday 05:00 UTC (after e2e-metallb at 04:00)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/kind-add-kube-prometheus-stack.sh'
      - '.github/workflows/monitoring-test.yml'

permissions:
  contents: read

concurrency:
  group: monitoring-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monitoring-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make deps

      # Granular install — `make install-all` only covers cluster + dashboard +
      # ingress + LB + demo apps; metrics-server and in-cluster NFS are NOT
      # included there. Mirror ci.yml's e2e step sequence so `make e2e` (which
      # asserts metrics-server APIService Available and NFS PVC bind) passes.
      - name: Create cluster
        run: make kind-create

      - name: Export certs
        run: ./scripts/kind-export-cert.sh

      - name: Install Headlamp
        run: ./scripts/kind-add-headlamp.sh

      - name: Install Traefik ingress
        run: ./scripts/kind-add-traefik.sh

      - name: Install cloud-provider-kind
        run: make lb-cpk

      - name: Install metrics-server
        run: ./scripts/kind-add-metrics-server.sh

      - name: Install in-cluster NFS
        run: ./scripts/kind-add-nfs-incluster.sh

      - name: Deploy ingress demo
        run: ./scripts/kind-deploy-app-ingress-localhost.sh

      - name: Deploy helloweb
        run: ./scripts/kind-deploy-app-helloweb.sh

      - name: Deploy golang-hello-world-web
        run: ./scripts/kind-deploy-app-golang-hello-world-web.sh

      - name: Deploy foo-bar-service
        run: ./scripts/kind-deploy-app-foo-bar-service.sh

      - name: Apply demo-apps ingress rules
        run: |
          kubectl apply -f k8s/demo-apps-ingress.yaml
          for _ in $(seq 1 60); do
            [ -n "$(kubectl get ingress/demo-apps -o jsonpath='{.status.loadBalancer.ingress[0]}' 2>/dev/null)" ] && break
            sleep 1
          done
          kubectl get ingress/demo-apps -o jsonpath='{.status.loadBalancer.ingress[0]}' | grep -q . \
            || { echo "ERROR: demo-apps ingress did not propagate after 60s"; kubectl get ingress/demo-apps -o yaml; exit 1; }

      - name: Wait for ingress route readiness
        # K1.5 — same dual-probe poll as ci.yml: wait for both the
        # demo-localhost Ingress (demo.localdev.me) and the demo-apps
        # Ingress (helloweb host) before running the smoke test.
        run: |
          INGRESS_IP=$(kubectl get svc -n traefik traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          probe() {
            docker exec kind-control-plane curl -sf --max-time 3 \
              -H "Host: $1" "http://${INGRESS_IP}/" 2>/dev/null | grep -q "$2"
          }
          for i in $(seq 1 60); do
            if probe demo.localdev.me 'It works!' && probe helloweb.localdev.me 'Hello, world!'; then
              echo "ingress routes ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: ingress routes did not become reachable within 120s"
          kubectl -n traefik get pods -o wide
          docker ps --filter name=cloud-provider-kind --filter name=kindccm- --format 'table {{.Names}}\t{{.Status}}'
          exit 1

      - name: Install kube-prometheus-stack
        run: make kube-prometheus-stack

      # Asserts kube-prometheus-stack (Grafana LB IP, admin secret) on top of
      # the standard smoke checks; metrics-server + in-cluster NFS are also
      # installed above, so opt their assertions in too. Values are quoted so
      # YAML keeps them the literal string "yes" the smoke script compares to.
      - name: Smoke test
        env:
          TEST_MONITORING: "yes"
          TEST_METRICS_SERVER: "yes"
          TEST_NFS: "yes"
        run: make e2e-smoke
