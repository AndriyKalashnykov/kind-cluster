name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      # Tag pushes (v*) must run the full pipeline even when the tagged commit
      # is already on main and the path filter would compute an empty diff —
      # otherwise a release tag silently skips static-check / docker / e2e.
      code: ${{ startsWith(github.ref, 'refs/tags/') && 'true' || steps.filter.outputs.code }}
      # `docs` = any markdown changed. Used to run the lightweight docs-lint job
      # (mermaid-lint) on doc-ONLY changes, so a broken ```mermaid block in a
      # *.md file is gated without paying for the full e2e. When `code` is also
      # true, static-check already runs mermaid-lint, so docs-lint self-skips.
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          # `base` is honored only on push events (and is required for
          # `act push`, whose event payload omits `repository.default_branch`).
          # On pull_request events dorny/paths-filter ignores `base` and emits
          # a warning annotation — gate it to push events to keep PR runs clean.
          base: ${{ github.event_name == 'push' && 'main' || '' }}
          filters: |
            code:
              - '!(**.md|docs/**|LICENSE|.gitignore|.claudeignore|.claude/**|**.png|**.jpg|**.gif|**.svg)'
              # Diagram SOURCES are code — diagrams-check (in static-check) renders
              # them and git-diffs the committed PNGs. Without this re-include, a
              # docs/diagrams/*.puml change (e.g. a Renovate C4-PlantUML !include
              # bump) is classified docs-only, static-check is skipped on the PR,
              # and a stale-PNG change merges green (the rendered PNGs under out/
              # stay excluded via **.png above, so PNG-only commits still skip).
              - 'docs/diagrams/**/*.puml'
            # Any markdown — drives docs-lint (mermaid-lint) on doc-only changes.
            # CLAUDE.md is intentionally NOT re-included in `code` (it carries no
            # mermaid and never affects the build/e2e), so a CLAUDE.md-only edit
            # is docs-only and skips the ~4-min e2e; its mermaid, if ever added,
            # is still gated here via docs-lint.
            docs:
              - '**.md'

  static-check:
    needs: [changes]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Static check
        run: make static-check

  docker:
    needs: [changes, static-check]
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # No jdx/mise-action here (unlike static-check/e2e): `make image-test` ->
    # image-build -> deps-docker is a `command -v docker` check + `docker build`
    # / `docker run`. It installs NO .mise.toml tool, so `mise install` never
    # runs and the anonymous-API rate-limit concern does not apply. Docker-only.
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Build
        run: make image-test

  e2e:
    needs: [changes, static-check]
    # Explicit `if:` strips the implicit success() check — without the
    # !failure() && !cancelled() prefix, a failed `changes`/`static-check`
    # leaks past this gate and e2e runs against broken state. Mirrors the
    # static-check / docker gates above. (Single-line form MUST be ${{ }}-
    # wrapped: a bare leading `!` is invalid YAML.)
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        # docker, helm, curl, base64 — versions for kind/kubectl/jq/etc come from
        # .mise.toml (Renovate-tracked via the mise manager); KIND_NODE_IMAGE is
        # still pinned in Makefile. Avoids helm/kind-action's auto-teardown
        # which flaked on Docker daemon "did not receive an exit event" errors
        # at job-end.
        run: make deps

      - name: Create cluster
        run: make kind-create

      - name: Show cluster info
        run: |
          kubectl cluster-info
          kubectl version --client
          kubectl get pods -n kube-system

      - name: Export certs
        run: ./scripts/kind-export-cert.sh

      - name: Install cloud-provider-kind
        # CPK must be running before Traefik installs — Traefik's helm chart
        # creates a Service of type LoadBalancer and `helm --wait` blocks on
        # .status.loadBalancer being populated, which requires a LB controller.
        # CPK runs as a host docker container bound to the `kind` network and
        # `docker.sock`. Image version pinned in Makefile (CLOUD_PROVIDER_KIND_VERSION,
        # Renovate-tracked), exported via Makefile. Invoke via `make lb-cpk` so the
        # env var is set — the script itself hard-requires the var, no fallback.
        # MetalLB path covered by weekly e2e-metallb.yml.
        run: make lb-cpk

      - name: Install Headlamp
        run: ./scripts/kind-add-headlamp.sh

      - name: Install Traefik ingress
        run: ./scripts/kind-add-traefik.sh

      - name: Install metrics-server
        run: ./scripts/kind-add-metrics-server.sh

      - name: Install in-cluster NFS
        run: ./scripts/kind-add-nfs-incluster.sh

      - name: Deploy ingress demo
        run: ./scripts/kind-deploy-app-ingress-localhost.sh

      - name: Deploy helloweb
        run: ./scripts/kind-deploy-app-helloweb.sh

      - name: Deploy golang-hello-world-web
        run: ./scripts/kind-deploy-app-golang-hello-world-web.sh

      - name: Deploy foo-bar-service
        run: ./scripts/kind-deploy-app-foo-bar-service.sh

      - name: Apply demo-apps ingress rules
        # Subdomain-based routing for helloweb / golang / foo. Services
        # above are ClusterIP; Traefik fronts them via *.localdev.me
        # virtual hosts. `kind-install-all.sh` applies this too, but CI
        # invokes the deploy scripts directly, so the ingress file needs
        # its own explicit step here (and in e2e-metallb.yml).
        #
        # `kubectl apply` returns after etcd commit; Traefik needs
        # additional time to watch the resource, reconcile the routers,
        # and populate .status.loadBalancer. Block until that happens so
        # smoke tests don't race the controller — previously passed
        # locally then failed in CI because the human delay between
        # install and test closed the race on laptops but not on runners.
        run: |
          kubectl apply -f k8s/demo-apps-ingress.yaml
          # Wait for Traefik to reconcile the new rules. The ingress[0]
          # element gets .ip (cloud-provider-kind / MetalLB) or .hostname
          # depending on the LB provider — poll for the array element
          # being non-empty, portable across either.
          for _ in $(seq 1 60); do
            [ -n "$(kubectl get ingress/demo-apps -o jsonpath='{.status.loadBalancer.ingress[0]}' 2>/dev/null)" ] && break
            sleep 1
          done
          kubectl get ingress/demo-apps -o jsonpath='{.status.loadBalancer.ingress[0]}' | grep -q . \
            || { echo "ERROR: demo-apps ingress did not propagate after 60s"; kubectl get ingress/demo-apps -o yaml; exit 1; }

      - name: Wait for ingress route readiness
        # K1.5 — `kubectl wait` returns once `.status.loadBalancer.ingress[0]`
        # is populated, but cloud-provider-kind's per-Service `kindccm-<hash>`
        # Envoy sidecar takes 5–60s longer to wire the data path. AND the
        # demo-apps Ingress (helloweb / golang / foo) reconcile can lag the
        # demo-localhost Ingress (demo.localdev.me) — polling only the latter
        # misses that race and the smoke test then intermittently fails the
        # demo-apps assertions (MetalLB E2E hit exactly this on the `c3a9315`
        # merge run and earlier on `170c7c9`). Wait for BOTH ingresses to
        # respond. Bail with a diagnostic dump after 60×2s.
        run: |
          INGRESS_IP=$(kubectl get svc -n traefik traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          probe() {
            docker exec kind-control-plane curl -sf --max-time 3 \
              -H "Host: $1" "http://${INGRESS_IP}/" 2>/dev/null | grep -q "$2"
          }
          for i in $(seq 1 60); do
            if probe demo.localdev.me 'It works!' && probe helloweb.localdev.me 'Hello, world!'; then
              echo "ingress routes ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: ingress routes did not become reachable within 120s"
          kubectl -n traefik get pods -o wide
          kubectl -n traefik logs deploy/traefik --tail=80 || true
          docker ps --filter name=cloud-provider-kind --filter name=kindccm- --format 'table {{.Names}}\t{{.Status}}'
          exit 1

      - name: Smoke test
        # The e2e job installs metrics-server + in-cluster NFS above, so opt
        # the smoke test into asserting them. Both are off by default because
        # install-all omits them — a fresh `make e2e` skips these assertions.
        env:
          TEST_METRICS_SERVER: "yes"
          TEST_NFS: "yes"
        run: make e2e-smoke

      - name: Verify deploy idempotency
        run: |
          ./scripts/kind-deploy-app-ingress-localhost.sh
          ./scripts/kind-deploy-app-helloweb.sh
          ./scripts/kind-deploy-app-foo-bar-service.sh

  docs-lint:
    needs: [changes]
    # Runs ONLY on doc-only changes (docs changed, no code). When `code` is true,
    # static-check already runs these, so this self-skips to avoid a redundant
    # run. Runs the doc-relevant subset of static-check WITHOUT the ~4-min e2e:
    #   * secrets (gitleaks) — a secret pasted into any *.md (README/CLAUDE.md/
    #     docs/**) would otherwise ship unscanned on a doc-only PR, since gitleaks
    #     lives in static-check (gated on code=true).
    #   * mermaid-lint — a broken ```mermaid block breaks README rendering on
    #     github.com; README carries several such blocks.
    # These two are the ONLY static-check gates that apply to a markdown change
    # (lint/trivy-config/diagrams-check target shell/k8s/puml, not *.md).
    if: ${{ !failure() && !cancelled() && needs.changes.outputs.code == 'false' && needs.changes.outputs.docs == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Secret scan (gitleaks)
        run: make secrets

      - name: Mermaid lint
        run: make mermaid-lint

  ci-pass:
    needs: [changes, static-check, docker, e2e, docs-lint]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more upstream jobs failed."
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more upstream jobs were cancelled."
            exit 1
          fi
          echo "All CI jobs passed."
