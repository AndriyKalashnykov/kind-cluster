name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          # Explicit base ensures the action works under `act push` too —
          # act's event payload omits `repository.default_branch`, which the
          # action falls back to when `base` is unset.
          base: main
          filters: |
            code:
              - '!(**.md|docs/**|LICENSE|.gitignore|.claudeignore|.claude/**|**.png|**.jpg|**.gif|**.svg)'
              - 'CLAUDE.md'

  static-check:
    needs: [changes]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Static check
        run: make static-check

  docker:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Build image
        run: make image-test

  e2e:
    needs: [changes, static-check]
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        # docker, helm, curl, base64 — versions for kind/kubectl/jq/etc come from
        # .mise.toml (Renovate-tracked via the mise manager); KIND_NODE_IMAGE is
        # still pinned in Makefile. Avoids helm/kind-action's auto-teardown
        # which flaked on Docker daemon "did not receive an exit event" errors
        # at job-end.
        run: make deps

      - name: Create cluster
        run: make create-cluster

      - name: Show cluster info
        run: |
          kubectl cluster-info
          kubectl version --client
          kubectl get pods -n kube-system

      - name: Export certs
        run: ./scripts/kind-export-cert.sh

      - name: Install Kubernetes Dashboard
        run: ./scripts/kind-add-dashboard.sh

      - name: Install Nginx ingress
        run: ./scripts/kind-add-ingress-nginx.sh

      - name: Install cloud-provider-kind
        # CPK runs as a host docker container bound to the `kind` network and
        # `docker.sock`. Image version pinned in Makefile (CLOUD_PROVIDER_KIND_VERSION,
        # Renovate-tracked), exported via Makefile. Invoke via `make lb-cpk` so the
        # env var is set — the script itself hard-requires the var, no fallback.
        # MetalLB path covered by weekly e2e-metallb.yml.
        run: make lb-cpk

      - name: Install metrics-server
        run: ./scripts/kind-add-metrics-server.sh

      - name: Install in-cluster NFS
        run: ./scripts/kind-add-nfs-incluster.sh

      - name: Deploy ingress demo
        run: ./scripts/kind-deploy-app-nginx-ingress-localhost.sh

      - name: Deploy helloweb
        run: ./scripts/kind-deploy-app-helloweb.sh

      - name: Deploy golang-hello-world-web
        run: ./scripts/kind-deploy-app-golang-hello-world-web.sh

      - name: Deploy foo-bar-service
        run: ./scripts/kind-deploy-app-foo-bar-service.sh

      - name: Apply demo-apps ingress rules
        # Subdomain-based routing for helloweb / golang / foo. Services
        # above are ClusterIP; ingress-nginx fronts them via
        # *.localdev.me virtual hosts. `kind-install-all.sh` applies this
        # too, but CI invokes the deploy scripts directly, so the ingress
        # file needs its own explicit step here (and in e2e-metallb.yml).
        #
        # `kubectl apply` returns after etcd commit; ingress-nginx needs
        # additional time to watch the resource, reload nginx.conf, and
        # populate .status.loadBalancer. Block until that happens so smoke
        # tests don't race the controller — previously passed locally then
        # failed in CI because the human delay between install and test
        # closed the race on laptops but not on runners.
        run: |
          kubectl apply -f k8s/demo-apps-ingress.yaml
          # Wait for ingress-nginx to reconcile the new rules. Kind's controller
          # runs with --publish-status-address=localhost, so it fills
          # .status.loadBalancer.ingress[0].hostname (not .ip) — poll on the
          # array-element being non-empty, portable across publication modes.
          for _ in $(seq 1 60); do
            [ -n "$(kubectl get ingress/demo-apps -o jsonpath='{.status.loadBalancer.ingress[0]}' 2>/dev/null)" ] && break
            sleep 1
          done
          kubectl get ingress/demo-apps -o jsonpath='{.status.loadBalancer.ingress[0]}' | grep -q . \
            || { echo "ERROR: demo-apps ingress did not propagate after 60s"; kubectl get ingress/demo-apps -o yaml; exit 1; }

      - name: Wait for ingress route readiness
        # K1.5 — `kubectl wait` returns once `.status.loadBalancer.ingress[0]`
        # is populated, but cloud-provider-kind's per-Service `kindccm-<hash>`
        # Envoy sidecar takes 5–60s longer to wire the data path. The first
        # curl after `kubectl wait` frequently returns `(56) Recv failure:
        # Connection reset by peer` until the data plane catches up. Poll
        # demo.localdev.me through the ingress IP until the body assertion
        # would succeed; bail with a diagnostic dump after 60×2s.
        run: |
          INGRESS_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          for i in $(seq 1 60); do
            if docker exec kind-control-plane curl -sf --max-time 3 -H 'Host: demo.localdev.me' "http://${INGRESS_IP}/" 2>/dev/null | grep -q 'It works!'; then
              echo "ingress route ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: ingress route did not become reachable within 120s"
          kubectl -n ingress-nginx get pods -o wide
          kubectl -n ingress-nginx logs deploy/ingress-nginx-controller --tail=80 || true
          docker ps --filter name=cloud-provider-kind --filter name=kindccm- --format 'table {{.Names}}\t{{.Status}}'
          exit 1

      - name: Smoke test
        run: make e2e

      - name: Verify deploy idempotency
        run: |
          ./scripts/kind-deploy-app-nginx-ingress-localhost.sh
          ./scripts/kind-deploy-app-helloweb.sh
          ./scripts/kind-deploy-app-foo-bar-service.sh

  ci-pass:
    needs: [changes, static-check, docker, e2e]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Verify all jobs passed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ]; then
            echo "One or more upstream jobs failed."
            exit 1
          fi
          if [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more upstream jobs were cancelled."
            exit 1
          fi
          echo "All CI jobs passed."
