name: Gateway API E2E

on:
  schedule:
    - cron: '0 7 * * 0'  # Sunday 07:00 UTC (after registry at 06:00)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/kind-add-gateway-api-crds.sh'
      - 'scripts/kind-add-gateway-traefik.sh'
      - 'scripts/kind-add-gateway-istio.sh'
      - 'scripts/kind-add-gateway-nginx.sh'
      - 'scripts/kind-add-gateway-contour.sh'
      - 'scripts/kind-add-gateway-envoy.sh'
      - 'scripts/kind-add-gateway-kgateway.sh'
      - 'scripts/kind-add-gateway-kong.sh'
      - 'scripts/kind-add-traefik.sh'
      # CPK installer: this job is the only one that exercises CPK coexisting
      # with the Gateway API CRDs + safe-upgrades VAP (and the restart guard
      # below), so a change to how CPK is started must re-trigger it.
      - 'scripts/kind-add-cloud-provider-kind.sh'
      - 'k8s/gateway/**'
      # Local-CA TLS (cert-manager + sslip.io) is layered on the gateways and
      # asserted via TEST_TLS=yes in the same smoke run.
      - 'scripts/kind-add-cert-manager.sh'
      - 'scripts/kind-add-tls.sh'
      - 'scripts/kind-add-tls-all.sh'
      - 'k8s/tls/**'
      # Shared smoke chain: the TEST_GATEWAY_API / TEST_TLS assertions live in
      # e2e-smoke.sh, which ci.yml never runs with those flags — so a regression
      # there is only caught here.
      - 'scripts/e2e-smoke.sh'
      - 'scripts/lib.sh'
      - '.github/workflows/gateway-test.yml'

permissions:
  contents: read

concurrency:
  group: gateway-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gateway-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make deps

      # Full default stack (cluster + cloud-provider-kind + Traefik + Headlamp +
      # demo apps + ingress). Gateway API is layered on top via the opt-in targets.
      - name: Install stack
        run: make install-all

      - name: Wait for ingress route readiness
        # K1.5 — an assigned LB IP is not the same as a routable one; poll the
        # demo routes through the control-plane node before layering gateways on.
        run: |
          INGRESS_IP=$(kubectl get svc -n traefik traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          probe() {
            docker exec kind-control-plane curl -sf --max-time 3 \
              -H "Host: $1" "http://${INGRESS_IP}/" 2>/dev/null | grep -q "$2"
          }
          for i in $(seq 1 60); do
            if probe helloweb.localdev.me 'Hello, world!'; then
              echo "ingress routes ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: ingress routes did not become reachable within 120s"
          kubectl -n traefik get pods -o wide
          exit 1

      - name: Enable Traefik Gateway API provider
        run: make gateway-traefik

      - name: Install Istio Gateway API controller
        run: make gateway-istio

      - name: Install NGINX Gateway Fabric controller
        run: make gateway-nginx

      - name: Install Contour Gateway API controller
        run: make gateway-contour

      - name: Install Envoy Gateway controller
        run: make gateway-envoy

      - name: Install kgateway controller
        run: make gateway-kgateway

      - name: Install Kong Gateway API controller
        run: make gateway-kong

      # Trusted HTTPS via a local CA (cert-manager + sslip.io). cert-manager
      # then a static *.localdev.me cert (make tls) and per-LB-IP *.sslip.io
      # certs + HTTPS listeners on every installed gateway (make tls-all).
      - name: Install cert-manager and local CA
        run: make cert-manager

      # Traefik classic Ingress plus per-gateway sslip.io certs.
      - name: Wire TLS
        run: |
          make tls
          make tls-all

      # Asserts all Gateway API controllers (Traefik provider + Istio + NGINX
      # Gateway Fabric + Contour + Envoy Gateway + kgateway + Kong) front the same
      # demo backends, AND trusted HTTPS (TEST_TLS: --cacert, no -k) on the static
      # *.localdev.me path + each gateway's *.sslip.io path, on top of the standard
      # smoke checks. Quoted so YAML keeps the literal "yes" the smoke compares to.
      - name: Smoke test
        env:
          TEST_GATEWAY_API: "yes"
          TEST_TLS: "yes"
        run: make e2e-smoke

      # Standing regression guard for the cloud-provider-kind --gateway-channel
      # disabled hardening (scripts/kind-add-cloud-provider-kind.sh). At this
      # point the cluster carries the experimental Gateway API v1.5.1 CRDs and
      # their `safe-upgrades` ValidatingAdmissionPolicy (installed by the gateway
      # controllers). Restarting CPK re-runs its startup path WITH the VAP
      # present — the exact condition the MetalLB -> CPK migration hits. With
      # `--gateway-channel disabled` CPK skips its embedded (v1.4.0) GW API CRD
      # reconcile and comes back healthy; WITHOUT the flag it would try to
      # install pre-v1.5.0 CRDs, the VAP would deny it, and CPK would crash-loop
      # logging "Failed to start cloud controller". A clean run logs that string
      # zero times, so any occurrence after the restart is the regression.
      # (No standing job otherwise exercises CPK-startup-with-VAP-present — CPK
      # starts greenfield before the VAP here, and e2e-metallb's migration has
      # no VAP — so without this step a dropped flag would stay green in CI.)
      - name: Regression guard — CPK survives a restart with the Gateway API safe-upgrades VAP present
        run: |
          docker restart cloud-provider-kind
          sleep 30   # allow several crash-loop cycles (~30s each) if it WOULD crash
          fails=$(docker logs cloud-provider-kind 2>&1 | grep -c 'Failed to start cloud controller' || true)
          status=$(docker ps --filter name=cloud-provider-kind --format '{{.Status}}')
          echo "cloud-provider-kind status after restart: ${status:-<not running>} (crash-log count: ${fails:-0})"
          if [ "${fails:-0}" -gt 0 ]; then
            echo "::error::cloud-provider-kind crash-looped after restart (Failed to start cloud controller x${fails}) — the --gateway-channel disabled hardening in kind-add-cloud-provider-kind.sh has regressed; the safe-upgrades VAP is denying CPK's embedded pre-v1.5.0 Gateway API CRD install."
            docker logs cloud-provider-kind 2>&1 | tail -40
            exit 1
          fi
          echo "cloud-provider-kind survived a restart with the safe-upgrades VAP present (--gateway-channel disabled holding)."
