name: Gateway API E2E

on:
  schedule:
    - cron: '0 7 * * 0'  # Sunday 07:00 UTC (after registry at 06:00)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/kind-add-gateway-api-crds.sh'
      - 'scripts/kind-add-gateway-traefik.sh'
      - 'scripts/kind-add-gateway-istio.sh'
      - 'scripts/kind-add-gateway-nginx.sh'
      - 'scripts/kind-add-gateway-contour.sh'
      - 'scripts/kind-add-gateway-envoy.sh'
      - 'scripts/kind-add-gateway-kgateway.sh'
      - 'scripts/kind-add-gateway-kong.sh'
      - 'scripts/kind-add-traefik.sh'
      - 'k8s/gateway/**'
      # Local-CA TLS (cert-manager + sslip.io) is layered on the gateways and
      # asserted via TEST_TLS=yes in the same smoke run.
      - 'scripts/kind-add-cert-manager.sh'
      - 'scripts/kind-add-tls.sh'
      - 'scripts/kind-add-tls-all.sh'
      - 'k8s/tls/**'
      # Shared smoke chain: the TEST_GATEWAY_API / TEST_TLS assertions live in
      # e2e-smoke.sh, which ci.yml never runs with those flags — so a regression
      # there is only caught here.
      - 'scripts/e2e-smoke.sh'
      - 'scripts/lib.sh'
      - '.github/workflows/gateway-test.yml'

permissions:
  contents: read

concurrency:
  group: gateway-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gateway-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make deps

      # Full default stack (cluster + cloud-provider-kind + Traefik + Headlamp +
      # demo apps + ingress). Gateway API is layered on top via the opt-in targets.
      - name: Install stack
        run: make install-all

      - name: Wait for ingress route readiness
        # K1.5 — an assigned LB IP is not the same as a routable one; poll the
        # demo routes through the control-plane node before layering gateways on.
        run: |
          INGRESS_IP=$(kubectl get svc -n traefik traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          probe() {
            docker exec kind-control-plane curl -sf --max-time 3 \
              -H "Host: $1" "http://${INGRESS_IP}/" 2>/dev/null | grep -q "$2"
          }
          for i in $(seq 1 60); do
            if probe helloweb.localdev.me 'Hello, world!'; then
              echo "ingress routes ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: ingress routes did not become reachable within 120s"
          kubectl -n traefik get pods -o wide
          exit 1

      - name: Enable Traefik Gateway API provider
        run: make gateway-traefik

      - name: Install Istio Gateway API controller
        run: make gateway-istio

      - name: Install NGINX Gateway Fabric controller
        run: make gateway-nginx

      - name: Install Contour Gateway API controller
        run: make gateway-contour

      - name: Install Envoy Gateway controller
        run: make gateway-envoy

      - name: Install kgateway controller
        run: make gateway-kgateway

      - name: Install Kong Gateway API controller
        run: make gateway-kong

      # Trusted HTTPS via a local CA (cert-manager + sslip.io). cert-manager
      # then a static *.localdev.me cert (make tls) and per-LB-IP *.sslip.io
      # certs + HTTPS listeners on every installed gateway (make tls-all).
      - name: Install cert-manager + local CA
        run: make cert-manager

      - name: Wire TLS (Traefik classic Ingress + per-gateway sslip.io)
        run: |
          make tls
          make tls-all

      # Asserts all Gateway API controllers (Traefik provider + Istio + NGINX
      # Gateway Fabric + Contour + Envoy Gateway + kgateway + Kong) front the same
      # demo backends, AND trusted HTTPS (TEST_TLS: --cacert, no -k) on the static
      # *.localdev.me path + each gateway's *.sslip.io path, on top of the standard
      # smoke checks. Quoted so YAML keeps the literal "yes" the smoke compares to.
      - name: Smoke test
        env:
          TEST_GATEWAY_API: "yes"
          TEST_TLS: "yes"
        run: make e2e-smoke
