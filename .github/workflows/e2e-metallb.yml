name: E2E (MetalLB)

on:
  schedule:
    - cron: '0 4 * * 0'  # Sunday 04:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/kind-add-metallb.sh'
      - '.github/workflows/e2e-metallb.yml'

permissions:
  contents: read

concurrency:
  group: e2e-metallb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-metallb:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Verify runtime deps (docker, helm, curl, base64)
        # Versions for kind/kubectl/jq/etc come from .mise.toml (Renovate-tracked
        # via the mise manager). KIND_NODE_IMAGE is still pinned in Makefile.
        # Avoids helm/kind-action's auto-teardown which flaked on Docker daemon
        # "did not receive an exit event" errors at job-end.
        run: make deps

      - name: Create cluster
        run: make create-cluster

      - name: Show cluster info
        run: |
          kubectl cluster-info
          kubectl version --client
          kubectl get pods -n kube-system

      - name: Export certs
        run: ./scripts/kind-export-cert.sh

      - name: Install Kubernetes Dashboard
        run: ./scripts/kind-add-dashboard.sh

      - name: Install Nginx ingress
        run: ./scripts/kind-add-ingress-nginx.sh

      - name: Install MetalLB
        run: ./scripts/kind-add-metallb.sh

      - name: Install metrics-server
        run: ./scripts/kind-add-metrics-server.sh

      - name: Install in-cluster NFS
        run: ./scripts/kind-add-nfs-incluster.sh

      - name: Deploy ingress demo
        run: ./scripts/kind-deploy-app-nginx-ingress-localhost.sh

      - name: Deploy helloweb
        run: ./scripts/kind-deploy-app-helloweb.sh

      - name: Deploy golang-hello-world-web
        run: ./scripts/kind-deploy-app-golang-hello-world-web.sh

      - name: Deploy foo-bar-service
        run: ./scripts/kind-deploy-app-foo-bar-service.sh

      - name: Apply demo-apps ingress rules
        # Subdomain-based routing for helloweb / golang / foo. See ci.yml
        # for the same step — bundled ingress file must be applied after
        # Services exist but before smoke test runs.
        run: kubectl apply -f k8s/demo-apps-ingress.yaml

      - name: Smoke test
        env:
          LB: metallb
        run: make e2e

      - name: Idempotency check (re-run deploy scripts)
        run: |
          ./scripts/kind-deploy-app-nginx-ingress-localhost.sh
          ./scripts/kind-deploy-app-helloweb.sh
          ./scripts/kind-deploy-app-foo-bar-service.sh
