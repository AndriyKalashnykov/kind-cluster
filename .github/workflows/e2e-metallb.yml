name: MetalLB E2E

on:
  schedule:
    - cron: '0 4 * * 0'  # Sunday 04:00 UTC
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/kind-add-metallb.sh'
      - 'scripts/migrate-from-metallb.sh'
      - 'scripts/e2e-migrate-smoke.sh'
      # Shared smoke chain: a fix that only breaks the MetalLB path is NOT caught
      # by ci.yml's cloud-provider-kind e2e job, so include the shared scripts and
      # the migration's cloud-provider-kind target.
      - 'scripts/kind-add-cloud-provider-kind.sh'
      - 'scripts/e2e-smoke.sh'
      - 'scripts/lib.sh'
      # Trusted-HTTPS chain (TEST_TLS asserts the MetalLB-LB-IP path). Classic
      # Ingress only here, so cert-manager runs with ENABLE_GATEWAY_API=false and
      # no Gateway API CRDs are installed (the CRDs' safe-upgrades VAP would
      # otherwise block the migration step's cloud-provider-kind startup — see
      # the cert-manager install step's comment).
      - 'scripts/kind-add-cert-manager.sh'
      - 'scripts/kind-add-tls.sh'
      - 'k8s/tls/**'
      - '.github/workflows/e2e-metallb.yml'

permissions:
  contents: read

concurrency:
  group: e2e-metallb-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-metallb:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          install: true
          cache: true

      - name: Install dependencies
        # docker, helm, curl, base64 — versions for kind/kubectl/jq/etc come from
        # .mise.toml (Renovate-tracked via the mise manager); KIND_NODE_IMAGE is
        # still pinned in Makefile. Avoids helm/kind-action's auto-teardown
        # which flaked on Docker daemon "did not receive an exit event" errors
        # at job-end.
        run: make deps

      - name: Create cluster
        run: make kind-create

      - name: Show cluster info
        run: |
          kubectl cluster-info
          kubectl version --client
          kubectl get pods -n kube-system

      - name: Export certs
        run: ./scripts/kind-export-cert.sh

      - name: Install MetalLB
        # MetalLB must be installed before Traefik — Traefik's helm chart
        # creates a Service of type LoadBalancer and `helm --wait` blocks on
        # .status.loadBalancer being populated, which requires a LB provider.
        run: ./scripts/kind-add-metallb.sh

      - name: Install Headlamp
        run: ./scripts/kind-add-headlamp.sh

      - name: Install Traefik ingress
        run: ./scripts/kind-add-traefik.sh

      - name: Install metrics-server
        run: ./scripts/kind-add-metrics-server.sh

      - name: Install in-cluster NFS
        run: ./scripts/kind-add-nfs-incluster.sh

      - name: Deploy ingress demo
        run: ./scripts/kind-deploy-app-ingress-localhost.sh

      - name: Deploy helloweb
        run: ./scripts/kind-deploy-app-helloweb.sh

      - name: Deploy golang-hello-world-web
        run: ./scripts/kind-deploy-app-golang-hello-world-web.sh

      - name: Deploy foo-bar-service
        run: ./scripts/kind-deploy-app-foo-bar-service.sh

      - name: Apply demo-apps ingress rules
        # Subdomain-based routing for helloweb / golang / foo. See ci.yml
        # for the same step — bundled ingress file must be applied after
        # Services exist but before smoke test runs, plus a wait for
        # Traefik to propagate the rules (avoids a race that passed
        # on laptops but failed on runners).
        run: |
          kubectl apply -f k8s/demo-apps-ingress.yaml
          # See ci.yml for the rationale — Traefik fills
          # .status.loadBalancer.ingress[0].hostname, not .ip.
          for _ in $(seq 1 60); do
            [ -n "$(kubectl get ingress/demo-apps -o jsonpath='{.status.loadBalancer.ingress[0]}' 2>/dev/null)" ] && break
            sleep 1
          done
          kubectl get ingress/demo-apps -o jsonpath='{.status.loadBalancer.ingress[0]}' | grep -q . \
            || { echo "ERROR: demo-apps ingress did not propagate after 60s"; kubectl get ingress/demo-apps -o yaml; exit 1; }

      - name: Wait for ingress route readiness
        # K1.5 — MetalLB's L2 announcement / iptables rules take time to wire
        # the data path. AND the demo-apps Ingress (helloweb / golang / foo)
        # reconcile can lag the demo-localhost Ingress (demo.localdev.me) —
        # polling only the latter misses that race; the `c3a9315` merge run
        # failed 3/4 demo-app assertions for exactly this reason. Wait for
        # BOTH ingresses to respond. Bail with a diagnostic dump after 60×2s.
        run: |
          INGRESS_IP=$(kubectl get svc -n traefik traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          probe() {
            docker exec kind-control-plane curl -sf --max-time 3 \
              -H "Host: $1" "http://${INGRESS_IP}/" 2>/dev/null | grep -q "$2"
          }
          for i in $(seq 1 60); do
            if probe demo.localdev.me 'It works!' && probe helloweb.localdev.me 'Hello, world!'; then
              echo "ingress routes ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: ingress routes did not become reachable within 120s"
          kubectl -n traefik get pods -o wide
          kubectl -n traefik logs deploy/traefik --tail=80 || true
          kubectl -n metallb-system get pods,ipaddresspool,l2advertisement -o wide || true
          exit 1

      # Trusted HTTPS via a local CA (cert-manager + sslip.io). Closes the
      # MetalLB-TLS coverage gap: the TEST_TLS LB-IP assertion in e2e-smoke.sh
      # exercises trusted HTTPS terminating through the Traefik Service's
      # MetalLB-assigned LoadBalancer IP (not just the 127.0.0.1 hostPort), so
      # the "trusted HTTPS for all front doors" claim is verified under MetalLB
      # as well as cloud-provider-kind. No gateway/alt-ingress installed here,
      # so `make tls` (the classic Traefik Ingress cert) is sufficient — no
      # tls-all.
      #
      # ENABLE_GATEWAY_API=false is LOAD-BEARING here, not just an optimisation:
      # this job's TLS path is classic Ingress only (no Gateway resources), so
      # cert-manager needs no Gateway API support — AND installing the Gateway
      # API CRDs would deploy the `safe-upgrades` ValidatingAdmissionPolicy,
      # which the later migration step's cloud-provider-kind startup trips over.
      # CPK v0.10.0 force-reconciles its own embedded (standard-channel,
      # pre-v1.5.0) Gateway API CRDs at startup; the VAP denies that install and
      # CPK crash-loops without ever assigning a LoadBalancer IP, so the
      # migration smoke's CPK re-allocation never completes. Keeping Gateway API
      # out of this job entirely avoids the VAP and lets CPK start cleanly.
      # See scripts/kind-add-cert-manager.sh header.
      - name: Install cert-manager + local-CA TLS (classic Ingress, no Gateway API)
        env:
          ENABLE_GATEWAY_API: "false"
        run: |
          make cert-manager
          make tls

      - name: Smoke test
        # metrics-server + in-cluster NFS are installed above — opt their
        # assertions in (off by default; install-all omits both). TEST_TLS opts
        # in the trusted-HTTPS assertions (incl. the MetalLB-LB-IP path). Quoted
        # so YAML keeps them the literal string "yes" the smoke script compares to.
        env:
          LB: metallb
          TEST_METRICS_SERVER: "yes"
          TEST_NFS: "yes"
          TEST_TLS: "yes"
        run: make e2e-smoke

      - name: Verify deploy idempotency
        run: |
          ./scripts/kind-deploy-app-ingress-localhost.sh
          ./scripts/kind-deploy-app-helloweb.sh
          ./scripts/kind-deploy-app-foo-bar-service.sh

      # Migration smoke test: MetalLB → cloud-provider-kind.
      - name: Migration smoke test
        # After the MetalLB e2e passes, exercise the migrate-from-metallb.sh
        # path — switches the running cluster off MetalLB onto cloud-provider-kind
        # and re-asserts demo.localdev.me through the freshly-reallocated LB IP.
        # Catches regressions in the migration path that wouldn't surface from
        # green-field MetalLB or CPK runs alone.
        run: ./scripts/e2e-migrate-smoke.sh
