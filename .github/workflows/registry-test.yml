name: Registry E2E

on:
  schedule:
    - cron: '0 6 * * 0'  # Sunday 06:00 UTC (after e2e-metallb + monitoring)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/kind-with-registry.sh'
      - 'scripts/test-registry.sh'
      # test-registry.sh sources scripts/lib.sh — include it so a helper change
      # that breaks the registry smoke test triggers this workflow.
      - 'scripts/lib.sh'
      - 'k8s/helloweb-deployment-local.yaml'
      - '.github/workflows/registry-test.yml'

permissions:
  contents: read

concurrency:
  group: registry-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  registry-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make deps

      - name: Create registry-wired cluster
        # `make registry` runs scripts/kind-with-registry.sh which creates a
        # KinD cluster wired to a Docker registry at localhost:5001 (containerd
        # mirrors that registry from inside kind nodes). Distinct from
        # `install-all`'s cluster — separate path, separate test.
        run: make registry

      - name: Push image and verify in-cluster pull
        # scripts/test-registry.sh: pulls hello-app:2.0, retags to
        # localhost:5001/hello-app:2.0, pushes, applies the matching
        # Deployment/Service, port-forwards, and curls. End-to-end proof
        # that containerd is actually mirroring the local registry.
        run: make registry-test

      - name: Tear down
        # `make registry` creates a separately-named cluster (`kind-registry`)
        # via scripts/kind-with-registry.sh. The Makefile default
        # KIND_CLUSTER_NAME=kind doesn't match — override here so kind-destroy
        # tears down the right cluster.
        if: always()
        env:
          KIND_CLUSTER_NAME: kind-registry
        run: make kind-destroy
