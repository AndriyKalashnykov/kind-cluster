name: Ingress (alternatives) E2E

on:
  schedule:
    - cron: '0 8 * * 0'  # Sunday 08:00 UTC (after gateway at 07:00)
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/kind-add-ingress-haproxy.sh'
      - 'scripts/kind-add-ingress-nginx.sh'
      - 'k8s/demo-apps-ingress-haproxy.yaml'
      - 'k8s/demo-apps-ingress-nginx.yaml'
      # Local-CA TLS (cert-manager + sslip.io) is layered on the alt ingresses
      # and asserted via TEST_TLS=yes in the same smoke run.
      - 'scripts/kind-add-cert-manager.sh'
      - 'scripts/kind-add-tls.sh'
      - 'scripts/kind-add-tls-all.sh'
      - 'k8s/tls/**'
      # Shared smoke chain: the TEST_INGRESS_ALT / TEST_TLS assertions live in
      # e2e-smoke.sh, which ci.yml never runs with those flags — so a regression
      # there is only caught here.
      - 'scripts/e2e-smoke.sh'
      - 'scripts/lib.sh'
      - '.github/workflows/ingress-test.yml'

permissions:
  contents: read

concurrency:
  group: ingress-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ingress-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          install: true
          cache: true

      - name: Install dependencies
        run: make deps

      # Full default stack (cluster + cloud-provider-kind + Traefik + Headlamp +
      # demo apps + ingress). The alternative classic Ingress controllers are
      # layered on top via the opt-in targets.
      - name: Install stack
        run: make install-all

      - name: Wait for ingress route readiness
        # K1.5 — an assigned LB IP is not the same as a routable one; poll the
        # demo routes through the control-plane node before layering controllers.
        run: |
          INGRESS_IP=$(kubectl get svc -n traefik traefik -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          probe() {
            docker exec kind-control-plane curl -sf --max-time 3 \
              -H "Host: $1" "http://${INGRESS_IP}/" 2>/dev/null | grep -q "$2"
          }
          for i in $(seq 1 60); do
            if probe helloweb.localdev.me 'Hello, world!'; then
              echo "ingress routes ready after $((i*2))s"
              exit 0
            fi
            sleep 2
          done
          echo "ERROR: ingress routes did not become reachable within 120s"
          kubectl -n traefik get pods -o wide
          exit 1

      - name: Install HAProxy Ingress controller
        run: make ingress-haproxy

      - name: Install NGINX Inc. Ingress controller
        run: make ingress-nginx

      # Trusted HTTPS via a local CA (cert-manager + sslip.io): make tls-all wires
      # a *.<lb-ip>.sslip.io cert + Ingress spec.tls onto each alt classic ingress.
      #
      # ENABLE_GATEWAY_API=false is REQUIRED here: this job's TLS path is classic
      # Ingress only (HAProxy + NGINX Inc.) with NO Gateway resources, so the
      # tls-all run wires only the classic-Ingress sslip.io certs (its Gateway
      # specs all skip). cert-manager's controller hard-crashes at startup when
      # enableGatewayAPI=true but the Gateway API CRDs are absent
      # ("the Gateway API CRDs do not seem to be present, but
      # ExperimentalGatewayAPISupport is set to true"). This job installs no
      # Gateway API CRDs — and since cloud-provider-kind now runs with
      # --gateway-channel disabled (commit e0824a1) it no longer side-installs
      # the embedded GW API CRDs that previously masked this. Mirrors
      # e2e-metallb.yml's classic-Ingress-only cert-manager step. See
      # scripts/kind-add-cert-manager.sh.
      - name: Install cert-manager + local CA
        env:
          ENABLE_GATEWAY_API: "false"
        run: make cert-manager

      - name: Wire TLS (per-ingress sslip.io)
        run: |
          make tls
          make tls-all

      # Asserts both alternative classic Ingress controllers (HAProxy + NGINX Inc.)
      # front the same demo backends on their own LB IPs, AND trusted HTTPS
      # (TEST_TLS: --cacert, no -k) on each via *.sslip.io, on top of the standard
      # smoke checks. Quoted so YAML keeps the literal string "yes".
      - name: Smoke test
        env:
          TEST_INGRESS_ALT: "yes"
          TEST_TLS: "yes"
        run: make e2e-smoke
