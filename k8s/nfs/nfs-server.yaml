---
apiVersion: v1
kind: Namespace
metadata:
  name: nfs-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nfs-server
  namespace: nfs-server
  labels:
    app: nfs-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nfs-server
  template:
    metadata:
      labels:
        app: nfs-server
    spec:
      containers:
        - name: nfs-server
          # sharedvolume/nfs-server is a maintained (2025) fork of the
          # itsthenetwork image with an identical SHARED_DIRECTORY/fsid=0
          # entrypoint contract, but pinned on an IMMUTABLE semver tag so the
          # digest can't be orphaned by an upstream re-push (the recurring
          # failure of itsthenetwork's mutable `:12` tag — see CLAUDE.md).
          image: sharedvolume/nfs-server:v0.1.0@sha256:299f82e2b7c0fd135d5deb5c09f111482400118c008cfd500d25a506b7455684
          ports:
            - name: nfs
              containerPort: 2049
          env:
            - name: SHARED_DIRECTORY
              value: /nfsshare
          securityContext:
            privileged: true
          volumeMounts:
            - name: export
              mountPath: /nfsshare
      volumes:
        - name: export
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nfs-server
  namespace: nfs-server
spec:
  selector:
    app: nfs-server
  ports:
    - name: nfs
      port: 2049
      targetPort: 2049
