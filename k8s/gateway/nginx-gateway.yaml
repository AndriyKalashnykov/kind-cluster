# NGINX Gateway Fabric (NGF) demo — a Gateway bound to NGF's built-in `nginx`
# GatewayClass (controllerName gateway.nginx.org/nginx-gateway-controller).
# Applying this Gateway auto-provisions an nginx Deployment+Service named
# "ngf-nginx" (<gateway>-nginx) in the default namespace; that Service is type
# LoadBalancer (the chart default), so cloud-provider-kind hands it its OWN
# external IP — a distinct front door from Traefik's hostPort 80 and Istio's
# gateway IP.
#
# The HTTPRoutes front the SAME backend Services as the classic Ingress, the
# Traefik Gateway and the Istio Gateway, on the original *.localdev.me hostnames
# (no collision — NGF answers on a different IP). This is the "same app, more
# front doors" demo. The single listener has no hostname (matches any), so the
# per-route hostnames below do the virtual-host routing.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ngf
  namespace: default
spec:
  gatewayClassName: nginx
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-helloweb
  namespace: default
spec:
  parentRefs:
    - name: ngf
  hostnames: ["helloweb.localdev.me"]
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: helloweb
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-golang
  namespace: default
spec:
  parentRefs:
    - name: ngf
  hostnames: ["golang.localdev.me"]
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: golang-hello-world-web-service
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: nginx-foo
  namespace: default
spec:
  parentRefs:
    - name: ngf
  hostnames: ["foo.localdev.me"]
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: foo-service
          port: 5678
