# Envoy Gateway demo. Unlike NGF/kgateway (which ship a built-in GatewayClass),
# Envoy Gateway does not create a GatewayClass by default, so we define one here
# bound to Envoy Gateway's controllerName. Applying the Gateway (gatewayClassName:
# envoy) auto-provisions an Envoy Deployment+Service in the envoy-gateway-system
# namespace with a generated name (discovered by the gateway.envoyproxy.io/
# owning-gateway-* labels); that Service is type LoadBalancer, so
# cloud-provider-kind hands it its OWN external IP — a distinct front door from
# Traefik / Istio / NGF / Contour.
#
# The HTTPRoutes front the SAME backend Services as the classic Ingress and the
# other Gateways, on the original *.localdev.me hostnames (no collision — Envoy
# Gateway answers on a different IP). The single listener has no hostname
# (matches any), so the per-route hostnames do the virtual-host routing.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: eg
  namespace: default
spec:
  gatewayClassName: envoy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: envoy-helloweb
  namespace: default
spec:
  parentRefs:
    - name: eg
  hostnames: ["helloweb.localdev.me"]
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: helloweb
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: envoy-golang
  namespace: default
spec:
  parentRefs:
    - name: eg
  hostnames: ["golang.localdev.me"]
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: golang-hello-world-web-service
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: envoy-foo
  namespace: default
spec:
  parentRefs:
    - name: eg
  hostnames: ["foo.localdev.me"]
  rules:
    - matches:
        - path: { type: PathPrefix, value: / }
      backendRefs:
        - name: foo-service
          port: 5678
