# HAProxy Ingress (jcmoraisjr/haproxy-ingress) demo — a GatewayClass + Gateway
# bound to HAProxy's controller (controllerName haproxy-ingress.github.io/controller).
# Unlike the per-Gateway data planes of Istio/NGF/Contour, HAProxy serves every
# Gateway/HTTPRoute for this class from ONE shared controller behind a single
# LoadBalancer Service (`haproxy-ingress` in namespace `haproxy-ingress`), which
# cloud-provider-kind gives its OWN external IP.
#
# The HTTPRoutes front the SAME backend Services as every other controller, on
# the original *.localdev.me hostnames (no collision — HAProxy answers on its own
# IP). Shape follows HAProxy Ingress v0.16's documented Gateway API example:
# the listener has no hostname (v0.16 supports only empty or "*" at the Gateway
# level), and per-route hostnames do the virtual-host routing. A rule with only
# backendRefs matches all paths.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: haproxy
spec:
  controllerName: haproxy-ingress.github.io/controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: haproxy
  namespace: default
spec:
  gatewayClassName: haproxy
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: haproxy-helloweb
  namespace: default
spec:
  parentRefs:
    - name: haproxy
  hostnames: ["helloweb.localdev.me"]
  rules:
    - backendRefs:
        - name: helloweb
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: haproxy-golang
  namespace: default
spec:
  parentRefs:
    - name: haproxy
  hostnames: ["golang.localdev.me"]
  rules:
    - backendRefs:
        - name: golang-hello-world-web-service
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: haproxy-foo
  namespace: default
spec:
  parentRefs:
    - name: haproxy
  hostnames: ["foo.localdev.me"]
  rules:
    - backendRefs:
        - name: foo-service
          port: 5678
